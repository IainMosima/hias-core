services:
  postgres:
    image: postgres:16-alpine
    container_name: hias_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supersecret}
      POSTGRES_DB: ${POSTGRES_DB:-hias_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-hias_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hias_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hias_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - hias_network
    restart: unless-stopped

  migrate:
    image: migrate/migrate:v4.17.0
    container_name: hias_migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./infrastructures/db/migration:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-supersecret}@postgres:5432/${POSTGRES_DB:-hias_db}?sslmode=disable"
      - "up"
    networks:
      - hias_network
    restart: "no"

  hias-core:
    image: mosimaiain/hias-core:v1
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: always
    platform: linux/amd64
    container_name: hias_core
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
      - "9090:9090"
    env_file:
      - docker.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - hias_network
    restart: unless-stopped

  frontend:
    image: mosimaiain/hias-frontend:latest
    pull_policy: always
    container_name: hias_frontend
    depends_on:
      hias-core:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://hias-core:8080}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - hias_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  hias_network:
    driver: bridge
