services:
  hias-core:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hias_core
    ports:
      - "8080:8080"
      - "9090:9090"
    env_file:
      - configs/app.env
    environment:
      # AWS credentials from .env (not in app.env for security)
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    networks:
      - hias_network
    restart: unless-stopped

networks:
  hias_network:
    driver: bridge